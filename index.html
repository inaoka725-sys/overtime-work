<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>時間外作業報告書</title>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'メイリオ', Meiryo, 'Hiragino Kaku Gothic Pro', sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }
    header {
      background: #1a3a5c;
      color: white;
      padding: 16px 20px;
      text-align: center;
    }
    header h1 { font-size: 20px; font-weight: bold; }
    header p { font-size: 12px; margin-top: 4px; opacity: 0.8; }

    .container { max-width: 900px; margin: 0 auto; padding: 20px 16px; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card h2 {
      font-size: 16px;
      color: #1a3a5c;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #1a3a5c;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full-width { grid-column: 1 / -1; }
    label {
      font-size: 12px;
      font-weight: bold;
      color: #555;
    }
    input[type="text"], input[type="date"], input[type="time"], select {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
      -webkit-appearance: none;
    }
    input:focus, select:focus { border-color: #1a3a5c; box-shadow: 0 0 0 3px rgba(26,58,92,0.1); }

    .radio-group { display: flex; gap: 12px; margin-top: 4px; }
    .radio-label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      flex: 1;
      justify-content: center;
    }
    .radio-label input[type="radio"] { display: none; }
    .radio-label.selected {
      background: #1a3a5c;
      color: white;
      border-color: #1a3a5c;
    }

    .result-box {
      background: #f8f9fb;
      border: 1px solid #e0e4ea;
      border-radius: 10px;
      padding: 16px;
      margin-top: 16px;
    }
    .result-box h3 { font-size: 13px; color: #666; margin-bottom: 12px; }
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }
    .result-row:last-child { border-bottom: none; }
    .result-label { font-size: 14px; color: #555; }
    .result-value {
      font-size: 22px;
      font-weight: bold;
      color: #1a3a5c;
    }
    .result-value span { font-size: 14px; font-weight: normal; margin-left: 2px; }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
      margin-top: 12px;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: #1a3a5c; color: white; }
    .btn-success { background: #27ae60; color: white; }
    .btn-danger { background: #e74c3c; color: white; font-size: 13px; padding: 6px 12px; width: auto; border-radius: 6px; margin-top: 0; }

    .entries-list { display: flex; flex-direction: column; gap: 12px; }
    .entry-item {
      background: #f8f9fb;
      border: 1px solid #e0e4ea;
      border-radius: 10px;
      padding: 14px;
    }
    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .entry-date { font-size: 13px; color: #888; }
    .entry-title { font-size: 15px; font-weight: bold; color: #1a3a5c; }
    .entry-details { font-size: 13px; color: #555; margin-top: 4px; }
    .entry-hours {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e0e4ea;
    }
    .hour-item { text-align: center; }
    .hour-item .h-label { font-size: 11px; color: #888; }
    .hour-item .h-value { font-size: 18px; font-weight: bold; color: #1a3a5c; }
    .hour-item .h-unit { font-size: 11px; color: #888; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
    }
    .badge-weekday { background: #e8f4fd; color: #2980b9; }
    .badge-holiday { background: #fdecea; color: #e74c3c; }
    .badge-onsite { background: #e8f8f0; color: #27ae60; }
    .badge-office { background: #fef9e7; color: #f39c12; }

    .return-work-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #e8f8f0;
      border: 1px solid #b2dfcc;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: #1a5c3a;
      font-weight: bold;
      margin-top: 4px;
    }
    .return-work-toggle input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    .return-work-fields {
      margin-top: 10px;
      padding: 14px;
      background: #f0faf5;
      border: 1px dashed #b2dfcc;
      border-radius: 8px;
    }
    .return-work-fields .form-grid { margin-top: 0; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #aaa;
      font-size: 14px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .summary-item.highlight {
      border-color: #e67e22;
    }
    .summary-item.highlight .s-value { color: #e67e22; }
    .summary-item {
      background: #f8f9fb;
      border: 1px solid #e0e4ea;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }
    .summary-item .s-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .summary-item .s-value { font-size: 24px; font-weight: bold; color: #1a3a5c; }
    .summary-item .s-unit { font-size: 13px; color: #888; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full-width { grid-column: 1; }
      .summary-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>時間外作業報告書</h1>
  <p>提出期限：各旬報〆日から３営業日以内　→　直近上司→所属部長→事務</p>
</header>

<div class="container">

  <!-- 入力フォーム -->
  <div class="card">
    <h2>作業内容入力</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="inputDate">
      </div>
      <div class="form-group">
        <label>報告者氏名</label>
        <input type="text" id="inputName" placeholder="氏名を入力">
      </div>
      <div class="form-group">
        <label>オーダー №</label>
        <input type="text" id="inputOrder" placeholder="オーダー番号">
      </div>
      <div class="form-group">
        <label>件名</label>
        <input type="text" id="inputSubject" placeholder="作業件名">
      </div>
      <div class="form-group">
        <label>区分</label>
        <div class="radio-group">
          <label class="radio-label selected" id="label-onsite">
            <input type="radio" name="workType" value="onsite" checked> 現場作業
          </label>
          <label class="radio-label" id="label-office">
            <input type="radio" name="workType" value="office"> 社内作業
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>平日 / 休日</label>
        <div class="radio-group">
          <label class="radio-label selected" id="label-weekday">
            <input type="radio" name="dayType" value="weekday" checked> 平日
          </label>
          <label class="radio-label" id="label-holiday">
            <input type="radio" name="dayType" value="holiday"> 休日
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>作業開始時間</label>
        <input type="time" id="inputStart" value="09:00">
      </div>
      <div class="form-group">
        <label>作業終了時間</label>
        <input type="time" id="inputEnd" value="21:00">
      </div>
    </div>

    <!-- 帰社後作業（現場作業時のみ表示） -->
    <div id="returnWorkSection" style="display:none; margin-top:12px;">
      <label class="return-work-toggle">
        <input type="checkbox" id="hasReturnWork"> 帰社後にも作業あり
      </label>
      <div id="returnWorkFields" style="display:none;">
        <div class="return-work-fields">
          <div class="form-grid">
            <div class="form-group">
              <label>帰社後 オーダー №</label>
              <input type="text" id="inputReturnOrder" placeholder="オーダー番号">
            </div>
            <div class="form-group">
              <label>帰社後 件名</label>
              <input type="text" id="inputReturnSubject" placeholder="作業件名">
            </div>
            <div class="form-group">
              <label>帰社後 作業開始時間</label>
              <input type="time" id="inputReturnStart" value="20:00">
            </div>
            <div class="form-group">
              <label>帰社後 作業終了時間</label>
              <input type="time" id="inputReturnEnd" value="22:00">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- リアルタイム計算結果 -->
    <div class="result-box">
      <h3>計算結果（時間外手当）</h3>
      <!-- 現場作業分 -->
      <div style="font-size:12px;font-weight:bold;color:#27ae60;margin-bottom:4px;" id="resultMainLabel">現場作業</div>
      <div class="result-row">
        <div class="result-label">普通残業</div>
        <div class="result-value" id="resultRegular">－<span>H</span></div>
      </div>
      <div class="result-row">
        <div class="result-label">深夜残業</div>
        <div class="result-value" id="resultLateNight">－<span>H</span></div>
      </div>
      <!-- 深夜作業手当（18時〜翌6時に常用勤務5h以上の場合） -->
      <div id="resultLateNightAllowanceRow" class="result-row" style="display:none;">
        <div class="result-label" style="color:#e67e22;font-weight:bold;">深夜作業手当</div>
        <div class="result-value" style="color:#e67e22;">3,000<span>円</span></div>
      </div>
      <div id="resultNote" style="font-size:12px;color:#888;margin-top:4px;margin-bottom:8px;"></div>
      <!-- 帰社後作業分（帰社後あり時のみ表示） -->
      <div id="resultReturnSection" style="display:none; border-top:1px solid #dde; padding-top:10px; margin-top:4px;">
        <div style="font-size:12px;font-weight:bold;color:#1a3a5c;margin-bottom:4px;">帰社後作業</div>
        <div class="result-row">
          <div class="result-label">普通残業</div>
          <div class="result-value" id="resultReturnRegular">－<span>H</span></div>
        </div>
        <div class="result-row">
          <div class="result-label">深夜残業</div>
          <div class="result-value" id="resultReturnLateNight">－<span>H</span></div>
        </div>
        <div style="font-size:12px;color:#888;margin-top:4px;">帰社後：全時間が残業対象</div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="addEntry()">この内容を追加</button>
  </div>

  <!-- 合計サマリー -->
  <div class="card" id="summaryCard" style="display:none;">
    <h2>合計</h2>
    <div class="summary-grid">
      <div class="summary-item">
        <div class="s-label">登録件数</div>
        <div class="s-value" id="totalCount">0</div>
        <div class="s-unit">件</div>
      </div>
      <div class="summary-item">
        <div class="s-label">普通残業 合計</div>
        <div class="s-value" id="totalRegular">0</div>
        <div class="s-unit">H</div>
      </div>
      <div class="summary-item">
        <div class="s-label">深夜残業 合計</div>
        <div class="s-value" id="totalLateNight">0</div>
        <div class="s-unit">H</div>
      </div>
      <div class="summary-item highlight">
        <div class="s-label">深夜作業手当 合計</div>
        <div class="s-value" id="totalLateNightAllowance">0</div>
        <div class="s-unit">円</div>
      </div>
    </div>
    <button class="btn btn-success" onclick="exportToExcel()">Excelファイルをダウンロード</button>
  </div>

  <!-- 登録済みリスト -->
  <div class="card">
    <h2>登録済み作業一覧</h2>
    <div class="entries-list" id="entriesList">
      <div class="empty-state">まだ登録がありません<br>上のフォームから作業を追加してください</div>
    </div>
  </div>

</div>

<script>
// ===== 計算ロジック =====

// 休憩時間（分単位、1日 = 1440分）
// 毎日繰り返す休憩パターン
const DAILY_BREAKS = [
  [720, 780],    // 12:00-13:00 (1.0h)
  [900, 930],    // 15:00-15:30 (0.5h)
  [1080, 1110],  // 18:00-18:30 (0.5h)
  [1320, 1350],  // 22:00-22:30 (0.5h)
  [120, 180],    // 02:00-03:00 (1.0h)
  [360, 390],    // 06:00-06:30 (0.5h)
  [510, 540],    // 08:30-09:00 (0.5h)
];

// 指定期間の休憩リストを生成（2日分）
function getBreaks() {
  const breaks = [];
  for (let day = 0; day < 3; day++) {
    for (const [s, e] of DAILY_BREAKS) {
      breaks.push([s + day * 1440, e + day * 1440]);
    }
  }
  return breaks;
}

// 区間 [a, b] 内の休憩時間合計（分）
function calcBreakMinutes(a, b, breaks) {
  let total = 0;
  for (const [s, e] of breaks) {
    const os = Math.max(a, s);
    const oe = Math.min(b, e);
    if (oe > os) total += oe - os;
  }
  return total;
}

// 区間 [a, b] と [c, d] の重複部分の実働時間（休憩除く）
function calcEffectiveMinutes(a, b, c, d, breaks) {
  const s = Math.max(a, c);
  const e = Math.min(b, d);
  if (e <= s) return 0;
  return Math.max(0, e - s - calcBreakMinutes(s, e, breaks));
}

// 時刻文字列 "HH:MM" → 分
function timeToMin(str) {
  if (!str) return 0;
  const [h, m] = str.split(':').map(Number);
  return h * 60 + (m || 0);
}

// 分 → 0.5h 単位で丸め
function roundToHalf(minutes) {
  return Math.round(minutes / 30) * 0.5;
}

// メイン計算関数
function calcOvertime(startStr, endStr, isHoliday) {
  let startMin = timeToMin(startStr);
  let endMin = timeToMin(endStr);

  if (endMin === 0) endMin = 1440; // 00:00 → 翌24:00
  if (endMin <= startMin) endMin += 1440; // 翌日

  const breaks = getBreaks();

  let overtimeStart;
  if (isHoliday) {
    // 休日：最初から全て残業
    overtimeStart = startMin;
  } else {
    // 平日：常用勤務開始から9時間30分後が残業開始（規程より）
    overtimeStart = startMin + 570; // 570分 = 9時間30分
  }

  if (endMin <= overtimeStart) {
    return { regular: 0, lateNight: 0, overtimeStart };
  }

  let regularMin = 0;
  let lateNightMin = 0;

  // 3日分の普通残業帯(6:00-22:00)と深夜残業帯(22:00-翌6:00)を計算
  for (let day = 0; day < 3; day++) {
    const base = day * 1440;
    // 普通残業帯: 6:00 - 22:00
    regularMin += calcEffectiveMinutes(overtimeStart, endMin, 360 + base, 1320 + base, breaks);
    // 深夜残業帯: 22:00 - 翌6:00
    lateNightMin += calcEffectiveMinutes(overtimeStart, endMin, 1320 + base, 1800 + base, breaks);
  }

  return {
    regular: roundToHalf(regularMin),
    lateNight: roundToHalf(lateNightMin),
    overtimeStart
  };
}

// 深夜作業手当の計算
// 深夜作業時間帯（18:00〜翌6:00）内に常用勤務が5時間以上含まれる場合、一律3,000円
// ※深夜作業手当と時間外作業手当は同一時間帯で重複しない（規程より）
function calcLateNightWorkAllowance(startStr, isHoliday) {
  if (isHoliday) return 0; // 休日は全て残業扱いのため適用なし

  const startMin = timeToMin(startStr);
  const overtimeStart = startMin + 570; // 9時間30分後 = 常用勤務終了
  const breaks = getBreaks();

  // 常用勤務時間帯（startMin〜overtimeStart）のうち深夜作業時間帯（18:00〜翌6:00）に含まれる実働分
  let lateWorkMin = 0;
  for (let day = 0; day < 3; day++) {
    const base = day * 1440;
    // 深夜作業時間帯: 18:00(1080) 〜 翌6:00(1800)
    lateWorkMin += calcEffectiveMinutes(startMin, overtimeStart, 1080 + base, 1800 + base, breaks);
  }

  return lateWorkMin >= 300 ? 3000 : 0; // 5時間(300分)以上で3,000円
}

// 分 → "HH:MM" 表示
function minToTimeStr(min) {
  const h = Math.floor(min / 60) % 24;
  const m = min % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// ===== UI ロジック =====
let entries = [];

// ラジオボタンのトグルUI
document.querySelectorAll('input[type="radio"]').forEach(radio => {
  radio.addEventListener('change', function() {
    const name = this.name;
    document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
      const labelId = `label-${r.value === 'weekday' ? 'weekday' : r.value === 'holiday' ? 'holiday' : r.value === 'onsite' ? 'onsite' : 'office'}`;
      const lbl = document.getElementById(labelId);
      if (lbl) lbl.classList.toggle('selected', r.checked);
    });
    // 現場作業のときのみ帰社後作業欄を表示
    const workType = document.querySelector('input[name="workType"]:checked').value;
    const returnSection = document.getElementById('returnWorkSection');
    if (workType === 'onsite') {
      returnSection.style.display = 'block';
    } else {
      returnSection.style.display = 'none';
      document.getElementById('hasReturnWork').checked = false;
      document.getElementById('returnWorkFields').style.display = 'none';
    }
    updatePreview();
  });
});

// 帰社後作業チェックボックス
document.getElementById('hasReturnWork').addEventListener('change', function() {
  document.getElementById('returnWorkFields').style.display = this.checked ? 'block' : 'none';
  updatePreview();
});

// 時刻入力時にリアルタイム計算
['inputStart', 'inputEnd', 'inputReturnStart', 'inputReturnEnd'].forEach(id => {
  document.getElementById(id).addEventListener('change', updatePreview);
});

// 今日の日付をデフォルト設定（ローカル時刻で正確に設定）
const _today = new Date();
document.getElementById('inputDate').value = `${_today.getFullYear()}-${String(_today.getMonth()+1).padStart(2,'0')}-${String(_today.getDate()).padStart(2,'0')}`;

function getFormValues() {
  const hasReturn = document.getElementById('hasReturnWork').checked;
  return {
    date: document.getElementById('inputDate').value,
    name: document.getElementById('inputName').value,
    order: document.getElementById('inputOrder').value,
    subject: document.getElementById('inputSubject').value,
    workType: document.querySelector('input[name="workType"]:checked').value,
    dayType: document.querySelector('input[name="dayType"]:checked').value,
    start: document.getElementById('inputStart').value,
    end: document.getElementById('inputEnd').value,
    hasReturnWork: hasReturn,
    returnOrder: hasReturn ? document.getElementById('inputReturnOrder').value : '',
    returnSubject: hasReturn ? document.getElementById('inputReturnSubject').value : '',
    returnStart: hasReturn ? document.getElementById('inputReturnStart').value : '',
    returnEnd: hasReturn ? document.getElementById('inputReturnEnd').value : '',
  };
}

function calcCombinedOvertime(v) {
  const isHoliday = v.dayType === 'holiday';
  const main = calcOvertime(v.start, v.end, isHoliday);
  let returnResult = null;
  if (v.hasReturnWork && v.returnStart && v.returnEnd) {
    // 帰社後作業は全て残業（現場作業後に帰社して継続）
    const ret = calcOvertime(v.returnStart, v.returnEnd, true);
    returnResult = { regular: ret.regular, lateNight: ret.lateNight };
  }
  const totalRegular = Math.round((main.regular + (returnResult ? returnResult.regular : 0)) * 10) / 10;
  const totalLateNight = Math.round((main.lateNight + (returnResult ? returnResult.lateNight : 0)) * 10) / 10;
  const lateNightAllowance = calcLateNightWorkAllowance(v.start, isHoliday);
  return {
    mainRegular: main.regular,
    mainLateNight: main.lateNight,
    returnRegular: returnResult ? returnResult.regular : 0,
    returnLateNight: returnResult ? returnResult.lateNight : 0,
    regular: totalRegular,
    lateNight: totalLateNight,
    lateNightAllowance,
    overtimeStart: main.overtimeStart,
  };
}

function updatePreview() {
  const v = getFormValues();
  if (!v.start || !v.end) return;

  const isHoliday = v.dayType === 'holiday';
  const result = calcCombinedOvertime(v);

  // 現場作業ラベル（社内作業時は「作業」と表示）
  const mainLabel = v.workType === 'onsite' ? '現場作業' : '作業';
  document.getElementById('resultMainLabel').textContent = mainLabel;

  document.getElementById('resultRegular').innerHTML = `${result.mainRegular}<span>H</span>`;
  document.getElementById('resultLateNight').innerHTML = `${result.mainLateNight}<span>H</span>`;

  // 深夜作業手当
  const allowanceRow = document.getElementById('resultLateNightAllowanceRow');
  allowanceRow.style.display = result.lateNightAllowance > 0 ? 'flex' : 'none';

  const rNote = document.getElementById('resultNote');
  if (!isHoliday) {
    rNote.textContent = `残業開始時間: ${minToTimeStr(result.overtimeStart)}（勤務開始から9時間30分後）`;
  } else {
    rNote.textContent = `休日：全時間が残業対象`;
  }

  // 帰社後作業セクション
  const retSection = document.getElementById('resultReturnSection');
  if (v.hasReturnWork && v.returnStart && v.returnEnd) {
    retSection.style.display = 'block';
    document.getElementById('resultReturnRegular').innerHTML = `${result.returnRegular}<span>H</span>`;
    document.getElementById('resultReturnLateNight').innerHTML = `${result.returnLateNight}<span>H</span>`;
  } else {
    retSection.style.display = 'none';
  }
}

// 初期表示：現場作業がデフォルト選択なので帰社後作業欄を表示
document.getElementById('returnWorkSection').style.display = 'block';

// 初期プレビュー
updatePreview();

function addEntry() {
  const v = getFormValues();
  if (!v.date) { alert('日付を入力してください'); return; }
  if (!v.name) { alert('報告者氏名を入力してください'); return; }
  if (!v.start || !v.end) { alert('作業時間を入力してください'); return; }

  const result = calcCombinedOvertime(v);

  entries.push({
    id: Date.now(),
    date: v.date,
    name: v.name,
    order: v.order,
    subject: v.subject,
    workType: v.workType,
    dayType: v.dayType,
    start: v.start,
    end: v.end,
    hasReturnWork: v.hasReturnWork,
    returnOrder: v.returnOrder,
    returnSubject: v.returnSubject,
    returnStart: v.returnStart,
    returnEnd: v.returnEnd,
    mainRegular: result.mainRegular,
    mainLateNight: result.mainLateNight,
    returnRegular: result.returnRegular,
    returnLateNight: result.returnLateNight,
    regular: result.regular,
    lateNight: result.lateNight,
    lateNightAllowance: result.lateNightAllowance,
  });

  renderEntries();
  updateSummary();

  // フォームリセット（日付・名前は維持）
  document.getElementById('inputOrder').value = '';
  document.getElementById('inputSubject').value = '';
  document.getElementById('inputReturnOrder').value = '';
  document.getElementById('inputReturnSubject').value = '';
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  renderEntries();
  updateSummary();
}

function renderEntries() {
  const list = document.getElementById('entriesList');
  if (entries.length === 0) {
    list.innerHTML = '<div class="empty-state">まだ登録がありません<br>上のフォームから作業を追加してください</div>';
    return;
  }

  list.innerHTML = entries.map(e => `
    <div class="entry-item">
      <div class="entry-header">
        <div>
          <div class="entry-date">${formatDate(e.date)}</div>
          <div class="entry-title">${e.name}</div>
          <div class="entry-details" style="margin-top:6px;">
            <span class="badge ${e.workType === 'onsite' ? 'badge-onsite' : 'badge-office'}">
              ${e.workType === 'onsite' ? '現場作業' : '社内作業'}
            </span>
            <span class="badge ${e.dayType === 'weekday' ? 'badge-weekday' : 'badge-holiday'}" style="margin-left:4px;">
              ${e.dayType === 'weekday' ? '平日' : '休日'}
            </span>
          </div>
          ${e.subject ? `<div class="entry-details">${e.subject}</div>` : ''}
        </div>
        <button class="btn btn-danger" onclick="deleteEntry(${e.id})">削除</button>
      </div>
      <!-- 現場作業 時間・残業 -->
      <div style="margin-bottom:${e.hasReturnWork ? '8px' : '0'};">
        <div class="entry-details">${e.start} ～ ${e.end}</div>
        ${e.order ? `<div class="entry-details" style="color:#888;">No. ${e.order}</div>` : ''}
        <div class="entry-hours">
          <div class="hour-item">
            <div class="h-label">普通残業</div>
            <div class="h-value">${e.mainRegular}</div>
            <div class="h-unit">H</div>
          </div>
          <div class="hour-item">
            <div class="h-label">深夜残業</div>
            <div class="h-value">${e.mainLateNight}</div>
            <div class="h-unit">H</div>
          </div>
          ${e.lateNightAllowance > 0 ? `
          <div class="hour-item" style="border-left:2px solid #e67e22;padding-left:12px;">
            <div class="h-label" style="color:#e67e22;">深夜作業手当</div>
            <div class="h-value" style="color:#e67e22;">${e.lateNightAllowance.toLocaleString()}</div>
            <div class="h-unit" style="color:#e67e22;">円</div>
          </div>` : ''}
        </div>
      </div>
      <!-- 帰社後作業 -->
      ${e.hasReturnWork ? `
      <div style="border-top:1px dashed #b2dfcc; padding-top:8px;">
        <div style="font-size:12px;font-weight:bold;color:#27ae60;margin-bottom:4px;">帰社後作業</div>
        <div class="entry-details">${e.returnStart} ～ ${e.returnEnd}</div>
        ${e.returnOrder ? `<div class="entry-details" style="color:#888;">No. ${e.returnOrder}</div>` : ''}
        ${e.returnSubject ? `<div class="entry-details">${e.returnSubject}</div>` : ''}
        <div class="entry-hours">
          <div class="hour-item">
            <div class="h-label">普通残業</div>
            <div class="h-value">${e.returnRegular}</div>
            <div class="h-unit">H</div>
          </div>
          <div class="hour-item">
            <div class="h-label">深夜残業</div>
            <div class="h-value">${e.returnLateNight}</div>
            <div class="h-unit">H</div>
          </div>
        </div>
      </div>` : ''}
    </div>
  `).join('');
}

function updateSummary() {
  const card = document.getElementById('summaryCard');
  if (entries.length === 0) {
    card.style.display = 'none';
    return;
  }
  card.style.display = 'block';
  document.getElementById('totalCount').textContent = entries.length;
  const totalReg = entries.reduce((s, e) => s + e.regular, 0);
  const totalNight = entries.reduce((s, e) => s + e.lateNight, 0);
  const totalAllowance = entries.reduce((s, e) => s + (e.lateNightAllowance || 0), 0);
  document.getElementById('totalRegular').textContent = Math.round(totalReg * 10) / 10;
  document.getElementById('totalLateNight').textContent = Math.round(totalNight * 10) / 10;
  document.getElementById('totalLateNightAllowance').textContent = totalAllowance.toLocaleString();
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, day] = dateStr.split('-').map(Number);
  const d = new Date(y, m - 1, day); // ローカル時刻で生成（UTC誤差を防ぐ）
  const wd = ['日','月','火','水','木','金','土'][d.getDay()];
  return `${y}年${m}月${day}日（${wd}）`;
}

// ===== Excel エクスポート =====
function exportToExcel() {
  if (entries.length === 0) {
    alert('登録データがありません');
    return;
  }

  const wb = XLSX.utils.book_new();

  // --- 報告書シート ---
  // 名前別にグループ化
  const byName = {};
  entries.forEach(e => {
    if (!byName[e.name]) byName[e.name] = [];
    byName[e.name].push(e);
  });

  Object.entries(byName).forEach(([name, items]) => {
    const wsData = [];

    wsData.push(['時間外作業報告書', '', '', '', '', '', '', '']);
    wsData.push(['下記のとおり時間外作業を報告します。', '', '', '', '', '', '', '']);
    wsData.push(['']);

    // 日付は最初のエントリの日付
    const firstDate = new Date(items[0].date + 'T00:00:00');
    const y = firstDate.getFullYear() - 2018; // 令和換算
    wsData.push(['日付', `令和　${y}年`, `${firstDate.getMonth()+1}月`, `${firstDate.getDate()}日`, '', '報告者氏名', name, '']);
    wsData.push(['']);

    // ヘッダー行
    wsData.push(['区分', '平日/休日', '日付', 'オーダー №', '件名', '作業開始', '作業終了', '普通残業(H)', '深夜残業(H)', '深夜作業手当(円)']);

    items.forEach(e => {
      // 現場作業行
      wsData.push([
        e.workType === 'onsite' ? '現場作業' : '社内作業',
        e.dayType === 'weekday' ? '平日' : '休日',
        e.date,
        e.order,
        e.subject,
        e.start,
        e.end,
        e.mainRegular,
        e.mainLateNight,
        e.lateNightAllowance || 0,
      ]);
      // 帰社後作業行（ある場合のみ）
      if (e.hasReturnWork) {
        wsData.push([
          '帰社後作業',
          e.dayType === 'weekday' ? '平日' : '休日',
          e.date,
          e.returnOrder,
          e.returnSubject,
          e.returnStart,
          e.returnEnd,
          e.returnRegular,
          e.returnLateNight,
          '',
        ]);
      }
    });

    wsData.push(['']);
    const totalReg = items.reduce((s, e) => s + e.regular, 0);
    const totalNight = items.reduce((s, e) => s + e.lateNight, 0);
    const totalAllowance = items.reduce((s, e) => s + (e.lateNightAllowance || 0), 0);
    wsData.push(['', '', '', '', '', '', '合計',
      Math.round(totalReg * 10) / 10,
      Math.round(totalNight * 10) / 10,
      totalAllowance
    ]);

    const ws = XLSX.utils.aoa_to_sheet(wsData);

    // 列幅設定
    ws['!cols'] = [
      {wch: 10}, {wch: 10}, {wch: 14}, {wch: 14}, {wch: 24},
      {wch: 10}, {wch: 10}, {wch: 12}, {wch: 12}, {wch: 16}
    ];

    // シート名（名前、20文字まで）
    const sheetName = name.substring(0, 20) || 'Sheet1';
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });

  // --- 一覧シート ---
  const listData = [
    ['日付', '報告者氏名', '区分', '平日/休日', 'オーダー №', '件名', '開始時間', '終了時間', '普通残業(H)', '深夜残業(H)', '深夜作業手当(円)']
  ];
  entries.forEach(e => {
    // 現場作業行
    listData.push([
      e.date,
      e.name,
      e.workType === 'onsite' ? '現場作業' : '社内作業',
      e.dayType === 'weekday' ? '平日' : '休日',
      e.order,
      e.subject,
      e.start,
      e.end,
      e.mainRegular,
      e.mainLateNight,
      e.lateNightAllowance || 0,
    ]);
    // 帰社後作業行
    if (e.hasReturnWork) {
      listData.push([
        e.date,
        e.name,
        '帰社後作業',
        e.dayType === 'weekday' ? '平日' : '休日',
        e.returnOrder,
        e.returnSubject,
        e.returnStart,
        e.returnEnd,
        e.returnRegular,
        e.returnLateNight,
        '',
      ]);
    }
  });
  // 合計行
  const tReg = entries.reduce((s, e) => s + e.regular, 0);
  const tNight = entries.reduce((s, e) => s + e.lateNight, 0);
  const tAllowance = entries.reduce((s, e) => s + (e.lateNightAllowance || 0), 0);
  listData.push(['', '', '', '', '', '', '', '合計',
    Math.round(tReg * 10) / 10,
    Math.round(tNight * 10) / 10,
    tAllowance
  ]);

  const wsList = XLSX.utils.aoa_to_sheet(listData);
  wsList['!cols'] = [
    {wch: 14}, {wch: 14}, {wch: 10}, {wch: 10}, {wch: 14},
    {wch: 24}, {wch: 10}, {wch: 10}, {wch: 12}, {wch: 12}, {wch: 16}
  ];
  XLSX.utils.book_append_sheet(wb, wsList, '一覧');

  // ファイル名に日付
  const today = new Date();
  const fname = `時間外作業報告書_${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb, fname);
}
</script>
